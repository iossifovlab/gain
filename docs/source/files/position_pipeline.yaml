- simple_effect_annotator:
    gene_models: hg38/gene_models/MANE/1.5

- position_score_annotator:
    resource_id: hg38/scores/phyloP7way
    attributes:
    - name: phyloP7way_max
      source: phyloP7way
      aggregator: max
    - name: phyloP7way_mean
      source: phyloP7way
      aggregator: mean
    - name: phyloP7way_list
      source: phyloP7way
      aggregator: list


- allele_score_annotator:
    resource_id: hg38/variant_frequencies/gnomAD_4.1.0/exomes/ALL
    attributes:
    - name: af_max
      source: AF
      aggregator: max
    - name: af_mean
      source: AF
      aggregator: mean
    - name: af_alleles
      source: allele
      include_attributes:
      - AF