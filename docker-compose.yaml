services:

  minio:
    # tb-eqh: pinned to a known-good release. Late-2023 MinIO removed
    # curl from the image (switched to ubi-micro), and `:latest` would
    # silently break the curl-based healthcheck on any agent that
    # pulled fresh. Pin so the image we test against matches what we
    # ship. Diagnosed in gpf where the symptom surfaced as a 27-test
    # S3 flake; gain has the same vulnerability and gets the same fix
    # defensively.
    # See: github.com/minio/minio/issues/18372 + /18389
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    # Network-only by default — host-side port publishing lives in
    # docker-compose.override.yaml so parallel CI builds (multiple
    # `core` matrix cells, overlapping master CI runs) don't collide
    # on the same host ports. CI invokes compose with
    # `-f docker-compose.yaml` to skip the override.
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      # tb-eqh: switched from `curl http://localhost:9000/minio/health/live`
      # to `mc ready local`. The minio image has `mc` at /usr/bin/mc
      # and the `local` alias preconfigured to http://localhost:9000.
      # `mc ready` polls the cluster-readiness endpoint and exits 0
      # when ready; under docker's timeout=5s it gets killed and
      # reported unhealthy if not.
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-client:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/test-bucket;  # Create bucket
      # /usr/bin/mc policy set public local/test-bucket;  # Make it public
      "
    depends_on:
      minio:
        condition: service_healthy


  apache:
    image: httpd:latest
    # Network-only by default — host-side port publishing lives in
    # docker-compose.override.yaml. See note on `minio` above.
    expose:
      - "80"
    volumes:
      - ./core/tests/.test_grr:/usr/local/apache2/htdocs/

  mail:
    image: mailhog/mailhog:latest
    hostname: mail
    expose:
      - "1025"
      - "8025"
