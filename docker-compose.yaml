services:

  minio:
    image: minio/minio:latest
    # Network-only by default — host-side port publishing lives in
    # docker-compose.override.yaml so parallel CI builds (multiple
    # `core` matrix cells, overlapping master CI runs) don't collide
    # on the same host ports. CI invokes compose with
    # `-f docker-compose.yaml` to skip the override.
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-client:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/test-bucket;  # Create bucket
      # /usr/bin/mc policy set public local/test-bucket;  # Make it public
      "
    depends_on:
      minio:
        condition: service_healthy


  apache:
    image: httpd:latest
    # Network-only by default — host-side port publishing lives in
    # docker-compose.override.yaml. See note on `minio` above.
    expose:
      - "80"
    volumes:
      - ./core/tests/.test_grr:/usr/local/apache2/htdocs/

  mail:
    image: mailhog/mailhog:latest
    hostname: mail
    expose:
      - "1025"
      - "8025"
