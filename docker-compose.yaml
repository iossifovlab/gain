services:

  minio:
    image: minio/minio:latest
    # Publish to 127.0.0.1 so local pytest runs on the host can reach
    # `localhost:9000` (the default MINIO_HOST endpoint in
    # core/gain/genomic_resources/testing.py:404). CI is unaffected
    # because the pytest container joins this compose network and
    # still reaches the service by its `minio` hostname.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-client:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/test-bucket;  # Create bucket
      # /usr/bin/mc policy set public local/test-bucket;  # Make it public
      "
    depends_on:
      minio:
        condition: service_healthy


  apache:
    image: httpd:latest
    # Map container :80 to host :28080 so local pytest runs can reach
    # the fixture server at `localhost:28080` (the default HTTP_HOST
    # in core/gain/genomic_resources/testing.py:393). CI uses the
    # `apache:80` service hostname over the compose network and is
    # unaffected.
    ports:
      - "127.0.0.1:28080:80"
    volumes:
      - ./core/tests/.test_grr:/usr/local/apache2/htdocs/

  mail:
    image: mailhog/mailhog:latest
    hostname: mail
    expose:
      - "1025"
      - "8025"
