name: gpfwa
services:

  pg-data:
    image: busybox:latest
    command: echo "PostgreSQL data only container"

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes_from:
      - pg-data
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gpfwa
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    image: mailhog/mailhog
    hostname: mail

  # One-shot: runs `python manage.py migrate` against the
  # production backend image and exits 0. The long-running
  # `backend` service depends on this completing.
  backend-migrate:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_daphne
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
    entrypoint: ["python", "-m", "django", "migrate", "--noinput"]
    restart: "no"

  backend-e2e-migrate:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_e2e
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
    entrypoint: ["python", "-m", "django", "migrate", "--noinput"]
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - ./gpfwa-data:/data
      - ./gpfwa-logs:/logs
      - /mnt/cephfs/seqpipe/grr:/grr
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_daphne
      GPFWA_EMAIL_HOST: mail
      GRR_DEFINITION_FILE: /grr-definition.yaml
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_DATA_STORAGE: /data
      GPFWA_LOG_DIR: /logs
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
      GPFWA_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      GPFWA_EMAIL_REDIRECT_ENDPOINT: "http://frontend"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:9001/api/user_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-e2e:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    hostname: backend
    depends_on:
      backend-e2e-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - ./gpfwa-data:/data
      - ./gpfwa-logs:/logs
      - /mnt/cephfs/seqpipe/grr:/grr
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_e2e
      GPFWA_EMAIL_HOST: mail
      GRR_DEFINITION_FILE: /grr-definition.yaml
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_DATA_STORAGE: /data
      GPFWA_LOG_DIR: /logs
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
      GPFWA_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      GPFWA_EMAIL_REDIRECT_ENDPOINT: "http://frontend"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:9001/api/user_info"]
      interval: 10s
      timeout: 5s
      retries: 5


  frontend:
    image: ${FRONTEND_IMAGE:-gain-web-ui-prod:latest}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-e2e:
    image: ${FRONTEND_IMAGE:-gain-web-ui-prod:latest}
    hostname: frontend
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5


  e2e-tests:
    build:
      context: ../web_e2e
      dockerfile: Dockerfile.playwright
    volumes:
      - ../web_e2e/reports:/reports
    depends_on:
      mail:
        condition: service_started
      backend-e2e:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
    environment:
      CI: "1"
    command: ["npx", "playwright", "test"]
