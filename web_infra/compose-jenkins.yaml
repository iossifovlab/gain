name: gpfwa
services:

  pg-data:
    image: busybox:latest
    command: echo "PostgreSQL data only container"

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes_from:
      - pg-data
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gpfwa
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    image: axllent/mailpit:latest
    hostname: mail

  # One-shot: runs `python manage.py migrate` against the
  # production backend image and exits 0. The long-running
  # `backend` service depends on this completing.
  backend-migrate:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_daphne
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
    entrypoint: ["python", "-m", "django", "migrate", "--noinput"]
    restart: "no"

  backend-e2e-migrate:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../web_api/admin_panel:/web_api_src/admin_panel:ro
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_e2e
      PYTHONPATH: /web_api_src
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
    entrypoint: ["python", "-m", "django", "migrate", "--noinput"]
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    # Run as the agent's uid/gid, not root. The GRR cache below is
    # long-lived and shared across builds (and with gpf-web-e2e); a
    # root-owned cache tree is one the `jenkins` user can neither
    # prune nor rewrite -- the EPERM-on-root-owned-artefacts bug this
    # stack has already hit once. The host bind sources are created by
    # the Jenkinsfile before compose runs, because dockerd creates a
    # *missing* bind source as root:root, which a non-root container
    # then cannot write into.
    user: "${AGENT_UID:-0}:${AGENT_GID:-0}"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - ./gpfwa-data:/data
      - ./gpfwa-logs:/logs
      # Persistent per-agent GRR cache, replacing the dead
      # /mnt/cephfs/seqpipe/grr NFS bind (piglet is decommissioned).
      # /grr_cache is what grr-definition-http.yaml names as its
      # cache_dir; the cache lands in /grr_cache/grr.sync/.
      - ${GRR_CACHE_DIR:-./grr_cache}:/grr_cache
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_daphne
      GPFWA_EMAIL_HOST: mail
      GRR_DEFINITION_FILE: /grr-definition-http.yaml
      # The image has no passwd entry for the agent uid, so HOME would
      # default to `/` (root-owned, unwritable). Point it somewhere
      # writable for any library that reaches for a dotfile cache.
      HOME: /tmp
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_DATA_STORAGE: /data
      GPFWA_LOG_DIR: /logs
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
      GPFWA_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      GPFWA_EMAIL_REDIRECT_ENDPOINT: "http://frontend"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:9001/api/user_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-e2e-setup:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    depends_on:
      backend-e2e-migrate:
        condition: service_completed_successfully
    volumes:
      - ../web_api/admin_panel:/web_api_src/admin_panel:ro
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_e2e
      PYTHONPATH: /web_api_src
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
    entrypoint:
      - sh
      - -c
      - >-
        python -m django create_user extra_units_user@email.com secret &&
        python -m django add_units extra_units_user@email.com
    restart: "no"

  backend-e2e:
    image: ${BACKEND_IMAGE:-gain-web-api-prod:latest}
    hostname: backend
    # Same rationale as `backend` above: agent uid, not root.
    user: "${AGENT_UID:-0}:${AGENT_GID:-0}"
    depends_on:
      backend-e2e-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - ./gpfwa-data:/data
      - ./gpfwa-logs:/logs
      - ${GRR_CACHE_DIR:-./grr_cache}:/grr_cache
      - ../web_api/admin_panel:/web_api_src/admin_panel:ro
    environment:
      DJANGO_SETTINGS_MODULE: web_annotation.settings_e2e
      PYTHONPATH: /web_api_src
      GPFWA_EMAIL_HOST: mail
      GRR_DEFINITION_FILE: /grr-definition-http.yaml
      HOME: /tmp
      GPFWA_DB_NAME: gpfwa
      GPFWA_DB_USER: postgres
      GPFWA_DB_PASSWORD: secret
      GPFWA_DB_HOST: db
      GPFWA_DB_PORT: 5432
      GPFWA_DATA_STORAGE: /data
      GPFWA_LOG_DIR: /logs
      GPFWA_SECRET_KEY: "django-insecure-3rz4n(_u+x8r+n%&xr-(vg83v8&llq7pin*x%@%y@d8af%iphk"
      GPFWA_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      GPFWA_EMAIL_REDIRECT_ENDPOINT: "http://frontend"
    # Probes pipeline_status, not /api/user_info, so e2e-tests
    # waits until pipeline/Clinical_annotation has finished its
    # first GRR build (~75s cold over the old NFS bind) before
    # tests start. Without this, the first test to
    # selectPipeline() pays the load cost and can blow
    # .loaded-editor's 120s wait under worker pressure
    # (annotation-jobs.spec.ts:105 was the canonical flake). The
    # endpoint is anonymous-readable and blocks in
    # pipeline_cache.py:get_pipeline until the future resolves;
    # --fail rejects non-2xx, --max-time bounds each call.
    #
    # start_period is generous because the GRR is now an http repo
    # with a cache whose unit is a WHOLE FILE, not a byte range:
    # against the NFS mount a tabix query read a few KB of a score
    # file, but on a cold cache the first open() downloads the
    # entire file. While in start_period a failing probe only marks
    # the container `starting` (it does not burn a retry), so this
    # is a budget for the cold pipeline build, not added latency:
    # a warm cache still goes healthy on the first probe. Overall
    # bound is the Jenkins job timeout.
    healthcheck:
      test: ["CMD", "curl", "--fail", "--max-time", "120",
             "http://localhost:9001/api/editor/pipeline_status?pipeline_id=pipeline/hg38_clinical_annotation"]
      interval: 10s
      timeout: 125s
      retries: 3
      start_period: 3600s


  frontend:
    image: ${FRONTEND_IMAGE:-gain-web-ui-prod:latest}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-e2e:
    image: ${FRONTEND_IMAGE:-gain-web-ui-prod:latest}
    hostname: frontend
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5


  e2e-tests:
    build:
      context: ../web_e2e
      dockerfile: Dockerfile.playwright
    volumes:
      - ../web_e2e/reports:/reports
    depends_on:
      mail:
        condition: service_started
      backend-e2e:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
    environment:
      CI: "1"
    command: ["npx", "playwright", "test"]
