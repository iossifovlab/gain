# CI-only GRR definition, selected via GRR_DEFINITION_FILE by
# web_infra/compose-jenkins.yaml (the gain-web-e2e stack).
#
# Replaces the bind-mounted NFS GRR (/mnt/cephfs/seqpipe/grr) that died with
# piglet's decommissioning. https://grr.seqpipe.org serves the same main GRR
# (its .CONTENTS.json.gz is byte-identical to grr.iossifovlab.com), mirrored
# by grr-sync on kowalski.
#
# Production is NOT affected: it keeps selecting /grr-definition-dir.yaml and
# CSHL's own on-host GRR (see gain-infra/files/compose.yaml).
#
# id MUST stay `grr.sync`:
#   the cache is keyed by child repo id -- cached_repository.py's
#   _get_or_create_cache_proto does os.path.join(self.cache_url, proto_id) --
#   so the cache materialises at <cache_dir>/grr.sync/. Renaming the id
#   silently orphans the warm cache (a cold re-download of everything), and
#   `grr.sync` is also what gpf calls the main GRR, so gain-web-e2e and
#   gpf-web-e2e SHARE one cached copy on the agent.
#
# NOTE: no `read_only: true` here. That field exists on FileRepoDefinition but
# NOT on HttpRepoDefinition, and _RepoDefinitionBase sets extra="forbid" --
# carrying it over from grr-definition.yaml is a hard validation failure.
# `public_url` is omitted on purpose too: it is allowed (it lives on the base
# class), but for an http repo it defaults to `url`, which is already the
# public, browsable location of exactly this data. (The resource links the UI
# renders come from Django's RESOURCES_BASE_URL setting, not from here.)
id: "grr.sync"
type: http
url: "https://grr.seqpipe.org"
cache_dir: /grr_cache
