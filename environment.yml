# This file may be used to create an environment using:
# $ conda env create --name <env> --file <this file>
# platform: linux-64
# conda create -c conda-forge -c bioconda -n <env name> --file <this file>
# - conda-forge 

name: gain
channels:
  - conda-forge
  - bioconda
  - iossifovlab
dependencies:
  - python=3.12
  - pysam=0.23.3
  - htslib=1.22
  - samtools=1.22
  - bcftools=1.22
  - pyliftover=0.4.1
  - pybigwig=0.3.24
  - lark=1.2.2
  - filelock=3.19
  - networkx=3.6
  - numpy=2.2.6
  - pandas=2.2.3
  - matplotlib-base=3.8
  - fsspec=2026.2
  - s3fs=2026.2
  - dask=2026.1
  - dask-jobqueue=0.9.0
  - python-box=7.1
  - setuptools=70.3
  - pip=24.1
  - apsw=3.52
  - cerberus=1.3
  - jinja2=3.1.5
  - markdown2=2.4
  - pydantic=2.8.2
  - hatchling
  - hatch-vcs
  - docker-py=7.1.0
  # pin the version of importlib_metadata due to issues with dask
  - importlib_metadata=8.6.1
  - psutil
  - intervaltree
