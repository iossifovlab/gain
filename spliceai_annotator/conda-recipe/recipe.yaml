schema_version: 1

context:
  name: gain-spliceai-annotator
  version: ${{ env.get("VCS_VERSION") | default("0.0.0.dev0") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # `uv build` writes a `.gitignore` with `*` into the dist dir; rattler-build
  # honours .gitignore by default and would skip every wheel/sdist, so we
  # opt out here.
  - path: ../../dist/spliceai_annotator
    use_gitignore: false
  - path: ../../LICENSE

build:
  noarch: python
  number: 0
  script:
    interpreter: bash
    content: |
      set -euo pipefail
      "$PYTHON" -m pip install --no-deps --no-build-isolation -vv ./*.whl

requirements:
  host:
    - python >=3.12
    - pip
  run:
    - python >=3.12
    - gain-core
    - numpy >=2.2
    # Both model runtimes: the backend is selected per process with
    # SPLICEAI_BACKEND (TensorFlow by default), so an installed package must
    # be able to run either. See spliceai_annotator_impl.
    #
    # >=1.26: conda-forge's newest onnxruntime is 1.26.0 and neither bioconda
    # nor iossifovlab carries it at all, so a >=1.27 bound is unsatisfiable
    # on the channels above -- and rattler-build does not solve run deps for
    # a noarch recipe, so it would have built and published green and failed
    # only for whoever installed it. Kept in step with the wheel's own bound
    # in pyproject.toml, which this recipe installs with --no-deps.
    - onnxruntime >=1.26
    - tensorflow >=2.18

about:
  homepage: https://github.com/IossifovLab/gain
  summary: GAIn SpliceAI annotator plugin
  license: MIT
  license_file: LICENSE
