<div id="front-page-container">
  <div id="front-page-header">
    <img src="{{ environment.imgPathPrefix }}/gain-logo.png" alt="GPF Logo" id="front-page-logo" />
    <h2>GAIn: Genomic Annotation Infrastructure</h2>
  </div>
  <div id="login-container">
    <h1>Registration</h1>
    <form (ngSubmit)="register()">
      <div class="form-group">
        <label for="email">email</label>
        <input
          #emailInput
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          spellcheck="false"
          pattern="^\w+([\.\-]?\w+)*@\w+([\.\-]?\w+)*(\.\w{2,3})+$" />
      </div>
      <div class="form-group">
        <label for="password">password</label>
        <input
          #passwordInput
          type="password"
          id="password"
          name="password"
          minlength="6"
          required
          autocomplete="new-password" />
      </div>
      @if (validationMessage) {
      <div id="validation-message" role="alert">{{ validationMessage }}</div>
      }
      <button id="login-button" type="submit">Create</button>
    </form>

    <div id="login-options">
      @if (responseMessage) {
      <div
        id="registration-message"
        role="alert"
        [class.response-success]="responseMessage.includes('success')"
        [class.response-error]="!responseMessage.includes('success')"
        >{{ responseMessage }}</div
      >
      }
      <div>
        <span>Already have an account? </span>
        <a routerLink="/login" id="login-link">Login</a>
      </div>
    </div>
  </div>
</div>
